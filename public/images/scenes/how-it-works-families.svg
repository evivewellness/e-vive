  <rect x="180" y="56" width="120" height="14" rx="4" fill="#004A99" opacity="0.8"/>
  <text x="188" y="67" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.85)">e-vive · Find a Carer</text>
  <!-- Search bar -->
